name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          MONGO_URI: mongodb://localhost:27017/lastkey_test

      - name: Run acceptance tests
        run: npm run test:acceptance
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          MONGO_URI: mongodb://localhost:27017/lastkey_test_acceptance

      - name: Run security hardening tests
        run: npm test -- tests/security-hardening.test.js
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          MONGO_URI: mongodb://localhost:27017/lastkey_test_security
          FREE_MODE: true
          EMAIL_MODE: console
          FEATURE_AI: false
          FEATURE_PAYMENTS: false

      - name: Run DEK encryption tests
        run: npm test -- tests/dek-encryption.test.js
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          MONGO_URI: mongodb://localhost:27017/lastkey_test_dek
          FREE_MODE: true
          EMAIL_MODE: console
          FEATURE_AI: false
          FEATURE_PAYMENTS: false

      - name: Run perfect workflow tests
        run: npm test -- tests/perfect-workflow.test.js
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          MONGO_URI: mongodb://localhost:27017/lastkey_test_perfect
          FREE_MODE: true
          EMAIL_MODE: console
          FEATURE_AI: false
          FEATURE_PAYMENTS: false

  lint-and-test-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:5000/api

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit (server)
        working-directory: ./server
        run: npm audit --audit-level=high || true

      - name: Run npm audit (client)
        working-directory: ./client
        run: npm audit --audit-level=high || true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified
